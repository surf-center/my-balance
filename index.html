<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consignatie Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body{
      margin:0;
      font-family:Poppins,sans-serif;
      background:#f5f7fb;
      color:#111827;
    }
    .wrap{
      max-width:1200px;
      margin:0 auto;
      padding:24px;
    }
    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
      gap:12px;
      flex-wrap:wrap;
    }
    .title{
      font-size:28px;
      font-weight:700;
    }
    .tabs{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:20px;
    }
    .tab-btn, button{
      border:none;
      border-radius:12px;
      padding:11px 16px;
      font-family:inherit;
      cursor:pointer;
      font-weight:600;
    }
    .tab-btn.active, .primary{
      background:#111827;
      color:#fff;
    }
    .secondary{
      background:#fff;
      border:1px solid #e5e7eb;
    }
    .card{
      background:#fff;
      border-radius:18px;
      box-shadow:0 10px 25px rgba(0,0,0,.08);
      padding:18px;
      margin-bottom:18px;
    }
    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
    }
    input, textarea, select{
      width:100%;
      padding:12px 14px;
      border:1px solid #e5e7eb;
      border-radius:12px;
      font-family:inherit;
      box-sizing:border-box;
      margin-bottom:12px;
    }
    textarea{min-height:140px}
    table{
      width:100%;
      border-collapse:collapse;
      font-size:14px;
    }
    th, td{
      text-align:left;
      padding:10px;
      border-bottom:1px solid #e5e7eb;
      vertical-align:top;
    }
    .hidden{display:none}
    .login{
      max-width:380px;
      margin:80px auto;
    }
    .msg{
      font-size:14px;
      margin-top:8px;
      color:#166534;
    }
    @media (max-width: 900px){
      .grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div id="loginView" class="wrap login">
    <div class="card">
      <div class="title" style="font-size:24px;">Admin login</div>
      <input type="password" id="loginCode" placeholder="Pincode">
      <button class="primary" onclick="login()">Inloggen</button>
      <div id="loginMsg" class="msg"></div>
    </div>
  </div>

  <div id="appView" class="wrap hidden">
    <div class="top">
      <div class="title">Consignatie Admin</div>
      <button class="secondary" onclick="loadData()">Vernieuwen</button>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="showTab('customers', this)">Klanten</button>
      <button class="tab-btn" onclick="showTab('items', this)">Items</button>
      <button class="tab-btn" onclick="showTab('templates', this)">Templates</button>
      <button class="tab-btn" onclick="showTab('maillog', this)">MailLog</button>
    </div>

    <div id="customers" class="tab">
      <div class="grid">
        <div class="card">
          <h3>Klant opslaan</h3>
          <input id="cNummer" placeholder="Nummer">
          <input id="cEmail" placeholder="Email">
          <input id="cPincode" placeholder="Pincode">
          <button class="primary" onclick="saveCustomer()">Opslaan</button>
          <div id="customerMsg" class="msg"></div>
        </div>
        <div class="card">
          <h3>Klanten</h3>
          <div id="customersTable"></div>
        </div>
      </div>
    </div>

    <div id="items" class="tab hidden">
      <div class="grid">
        <div class="card">
          <h3>Nieuw item toevoegen</h3>
          <input id="iNummer" placeholder="Klantnummer">
          <input id="iProduct" placeholder="Product">
          <input id="iPrijs" placeholder="Prijs">
          <input id="iKleur" placeholder="Kleur">
          <input id="iLink" placeholder="Link">
          <button class="primary" onclick="addItem()">Toevoegen in eerste lege slot</button>
          <div id="itemMsg" class="msg"></div>
        </div>
        <div class="card">
          <h3>Overzicht items</h3>
          <div id="itemsTable"></div>
        </div>
      </div>
    </div>

    <div id="templates" class="tab hidden">
      <div class="grid">
        <div class="card">
          <h3>Template opslaan</h3>
          <input id="tKey" placeholder="TemplateKey">
          <input id="tSubject" placeholder="Onderwerp">
          <textarea id="tBody" placeholder="Inhoud"></textarea>
          <button class="primary" onclick="saveTemplate()">Opslaan</button>
          <div id="templateMsg" class="msg"></div>
        </div>
        <div class="card">
          <h3>Templates</h3>
          <div id="templatesTable"></div>
        </div>
      </div>
    </div>

    <div id="maillog" class="tab hidden">
      <div class="card">
        <h3>Mail log</h3>
        <div id="mailLogTable"></div>
      </div>
    </div>
  </div>

  <script>
    let state = {
      customers: [],
      baseRows: [],
      templates: [],
      mailLog: []
    };

    function login() {
      const code = document.getElementById('loginCode').value;
      google.script.run.withSuccessHandler(function(ok){
        if (ok) {
          document.getElementById('loginView').classList.add('hidden');
          document.getElementById('appView').classList.remove('hidden');
          loadData();
        } else {
          document.getElementById('loginMsg').textContent = 'Onjuiste pincode';
        }
      }).checkAdminLogin(code);
    }

    function showTab(id, btn) {
      document.querySelectorAll('.tab').forEach(t => t.classList.add('hidden'));
      document.getElementById(id).classList.remove('hidden');
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    function loadData() {
      google.script.run.withSuccessHandler(function(data){
        state = data;
        renderCustomers();
        renderItems();
        renderTemplates();
        renderMailLog();
      }).getAllData();
    }

    function saveCustomer() {
      const data = {
        Nummer: document.getElementById('cNummer').value,
        Email: document.getElementById('cEmail').value,
        Pincode: document.getElementById('cPincode').value
      };
      google.script.run.withSuccessHandler(function(msg){
        document.getElementById('customerMsg').textContent = msg;
        loadData();
      }).saveCustomer(data);
    }

    function addItem() {
      const data = {
        Nummer: document.getElementById('iNummer').value,
        product: document.getElementById('iProduct').value,
        prijs: document.getElementById('iPrijs').value,
        kleur: document.getElementById('iKleur').value,
        link: document.getElementById('iLink').value
      };
      google.script.run.withSuccessHandler(function(msg){
        document.getElementById('itemMsg').textContent = msg;
        loadData();
      }).addItemToFirstEmptySlot(data);
    }

    function deleteItem(nummer, slot) {
      google.script.run.withSuccessHandler(function(msg){
        document.getElementById('itemMsg').textContent = msg;
        loadData();
      }).deleteItem({ Nummer: nummer, slot: slot });
    }

    function markSold(nummer, slot) {
      google.script.run.withSuccessHandler(function(msg){
        document.getElementById('itemMsg').textContent = msg;
        loadData();
      }).markItemAsSold({ Nummer: nummer, slot: slot });
    }

    function saveTemplate() {
      const data = {
        TemplateKey: document.getElementById('tKey').value,
        Onderwerp: document.getElementById('tSubject').value,
        Inhoud: document.getElementById('tBody').value
      };
      google.script.run.withSuccessHandler(function(msg){
        document.getElementById('templateMsg').textContent = msg;
        loadData();
      }).saveTemplate(data);
    }

    function renderCustomers() {
      let html = '<table><thead><tr><th>Nummer</th><th>Email</th><th>Pincode</th></tr></thead><tbody>';
      state.customers.forEach(c => {
        html += `<tr><td>${c.Nummer || ''}</td><td>${c.Email || ''}</td><td>${c.Pincode || ''}</td></tr>`;
      });
      html += '</tbody></table>';
      document.getElementById('customersTable').innerHTML = html;
    }

    function renderItems() {
      let html = '<table><thead><tr><th>Nummer</th><th>Naam</th><th>Slot</th><th>Product</th><th>Prijs</th><th>Acties</th></tr></thead><tbody>';
      state.baseRows.forEach(r => {
        r.items.forEach(item => {
          if (item.product) {
            html += `<tr>
              <td>${r.Nummer}</td>
              <td>${r.Naam}</td>
              <td>${item.slot}</td>
              <td>${item.product}</td>
              <td>€${item.prijs || ''}</td>
              <td>
                <button class="secondary" onclick="markSold('${r.Nummer}', ${item.slot})">Verkocht</button>
                <button class="secondary" onclick="deleteItem('${r.Nummer}', ${item.slot})">Verwijder</button>
              </td>
            </tr>`;
          }
        });
      });
      html += '</tbody></table>';
      document.getElementById('itemsTable').innerHTML = html;
    }

    function renderTemplates() {
      let html = '<table><thead><tr><th>Key</th><th>Onderwerp</th></tr></thead><tbody>';
      state.templates.forEach(t => {
        html += `<tr><td>${t.TemplateKey || ''}</td><td>${t.Onderwerp || ''}</td></tr>`;
      });
      html += '</tbody></table>';
      document.getElementById('templatesTable').innerHTML = html;
    }

    function renderMailLog() {
      let html = '<table><thead><tr><th>Datum</th><th>Nummer</th><th>Email</th><th>Template</th><th>Status</th></tr></thead><tbody>';
      state.mailLog.forEach(m => {
        html += `<tr>
          <td>${m.Datum || ''}</td>
          <td>${m.Nummer || ''}</td>
          <td>${m.Email || ''}</td>
          <td>${m.TemplateKey || ''}</td>
          <td>${m.Status || ''}</td>
        </tr>`;
      });
      html += '</tbody></table>';
      document.getElementById('mailLogTable').innerHTML = html;
    }
  </script>
</body>
</html>
